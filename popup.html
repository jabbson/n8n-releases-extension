<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n8n Releases</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>n8n Releases</h1>
      <button id="refresh-btn" title="Refresh releases">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M13.65 2.35A7.958 7.958 0 0 0 8 0C3.58 0 0 3.58 0 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z"/>
        </svg>
      </button>
    </header>
    
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading releases...</p>
    </div>
    
    <div id="error" class="error hidden">
      <p id="error-message"></p>
    </div>
    
    <div id="content" class="hidden">
      <section class="latest-release">
        <h2>Latest Release</h2>
        <div id="latest-release-container"></div>
      </section>
      
      <section class="past-releases">
        <div class="section-header" id="past-releases-header">
          <h2>Past Releases (Last 10)</h2>
          <svg class="section-toggle-icon" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
            <path d="M6 9L1 4h10z"/>
          </svg>
        </div>
        <div class="section-content" id="past-releases-container"></div>
      </section>
      
      <section class="pre-releases">
        <div class="section-header" id="pre-releases-header">
          <h2>Pre-releases (Last 10)</h2>
          <svg class="section-toggle-icon" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
            <path d="M6 9L1 4h10z"/>
          </svg>
        </div>
        <div class="section-content" id="pre-releases-container"></div>
      </section>
    </div>
  </div>
  
  <script src="marked.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
